name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔍 DEBUG 1: Check secret value
    - name: Check Docker Username
      run: echo "USERNAME=${{ secrets.DOCKER_USERNAME }}"

    # 🔍 DEBUG 2: Check files
    - name: Check Files
      run: ls -la

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image (TEST WITHOUT SECRET)
      run: docker build -t test/devops-app .

    - name: Push Docker Image (skip for now)
      run: echo "Skipping push for debug"

    - name: Deploy to EC2 (skip for now)
      run: echo "Skipping deploy for debug"
