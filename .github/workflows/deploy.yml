name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Step 1: Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔍 Step 2: Debug structure
    - name: Debug Structure
      run: ls -R

    # 🔐 Step 3: Docker Login
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🐳 Step 4: Build Docker Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .

    # 🚀 Step 5: Push Docker Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

    # ☁️ Step 6: Deploy to EC2 (SMART REPLACE)
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

          # Check if container exists
          if [ $(sudo docker ps -aq -f name=devops-app) ]; then
            echo "Stopping old container..."
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true
          fi

          echo "Starting new container..."
          sudo docker run -d -p 80:80 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
