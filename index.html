<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps CI/CD Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: inline-block;
        }

        h1 {
            color: #38bdf8;
        }

        p {
            margin: 10px 0;
        }

        .badge {
            margin-top: 20px;
            padding: 10px;
            background: #22c55e;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 DevOps CI/CD Pipeline</h1>
        <p>This application is deployed using:</p>

        <p>🐳 Docker Containerization</p>
        <p>☁️ AWS EC2 Cloud Server</p>
        <p>⚙️ GitHub Actions CI/CD</p>

        <div class="badge">
            ✅ Deployment Successful
        </div>
    </div>

</body>
</html>
