<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps CI/CD Project</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            padding: 40px;
        }

        h1 {
            color: #38bdf8;
            font-size: 40px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            margin: 15px auto;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .badge {
            margin-top: 30px;
            padding: 12px 20px;
            background: #22c55e;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
        }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 DevOps CI/CD Pipeline</h1>
        <p class="subtitle">Fully Automated Deployment using Modern DevOps Tools</p>

        <div class="card">🐳 Docker Containerization</div>
        <div class="card">☁️ AWS EC2 Cloud Deployment</div>
        <div class="card">⚙️ GitHub Actions CI/CD</div>

        <div class="badge">
            ✅ Deployment Successful & Automated
        </div>

        <div class="footer">
            Built by DevOps Engineer 💻
        </div>
    </div>

</body>
</html>
